{% extends 'base.html' %}
{% block page_title %}Logout{% endblock %}
{% block content %}
<div class="d-flex justify-content-center mt-5">
  <div class="card p-5 text-center" style="max-width:400px">
    <div style="font-size:48px">👋</div>
    <h5 class="fw-bold mt-2">Ready to leave?</h5>
    <p class="text-muted">You will be signed out of your account.</p>
    <form method="post" action="{% url 'accounts:logout' %}">{% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Yes, Logout</button>
      <a href="{% url 'dashboard:index' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
