{% extends 'base.html' %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div class="d-flex justify-content-center">
  <div class="card p-4" style="max-width:540px;width:100%">
    <h5 class="fw-bold mb-4">Edit User: {{ object.username }}</h5>
    <form method="post">{% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger" style="font-size:12px">{{ field.errors.0 }}</div>{% endif %}
      </div>
      {% endfor %}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn text-white" style="background:#4f46e5">Save Changes</button>
        <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
