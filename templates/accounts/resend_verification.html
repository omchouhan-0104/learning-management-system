{% extends 'base.html' %}
{% block page_title %}Verify Email{% endblock %}
{% block content %}
<div class="d-flex justify-content-center mt-4">
  <div class="card p-5 text-center" style="max-width:480px;width:100%">
    <div style="font-size:52px">📧</div>
    <h5 class="fw-bold mt-2">Verify Your Email</h5>
    <p class="text-muted">Your email <strong>{{ user.email }}</strong> has not been verified yet.</p>
    <p class="text-muted small">Click below to resend the verification link.</p>
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn text-white fw-bold px-4" style="background:#4f46e5">
        📨 Resend Verification Email
      </button>
    </form>
    <div class="mt-3">
      <a href="{% url 'dashboard:index' %}" class="small text-muted text-decoration-none">Skip for now →</a>
    </div>
  </div>
</div>
{% endblock %}
