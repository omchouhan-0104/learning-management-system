{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#1e1b4b,#4f46e5)">
  <div class="card p-4" style="width:420px;border-radius:16px">
    <h5 class="fw-bold mb-1 text-center">🔐 Reset Password</h5>
    <p class="text-muted small text-center mb-4">Enter your email address to receive a reset link.</p>
    <form method="post">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn text-white w-100 fw-bold" style="background:#4f46e5">Send Reset Link</button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'accounts:login' %}" class="small text-decoration-none" style="color:#4f46e5">← Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
