{% extends 'base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#1e1b4b,#4f46e5)">
  <div class="card p-5 text-center" style="max-width:420px;border-radius:16px">
    <div style="font-size:48px">📧</div>
    <h5 class="fw-bold mt-2">Check Your Email</h5>
    <p class="text-muted">A password reset link has been sent to your email address.</p>
    <a href="{% url 'accounts:login' %}" class="btn text-white" style="background:#4f46e5">Back to Login</a>
  </div>
</div>
{% endblock %}
