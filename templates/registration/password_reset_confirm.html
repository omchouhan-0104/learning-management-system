{% extends 'base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#1e1b4b,#4f46e5)">
  <div class="card p-4" style="width:420px;border-radius:16px">
    <h5 class="fw-bold mb-4 text-center">🔒 Set New Password</h5>
    <form method="post">{% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">{{ field.label }}</label>{{ field }}
        {% if field.errors %}<div class="text-danger" style="font-size:12px">{{ field.errors.0 }}</div>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn text-white w-100 fw-bold" style="background:#4f46e5">Set Password</button>
    </form>
  </div>
</div>
{% endblock %}
