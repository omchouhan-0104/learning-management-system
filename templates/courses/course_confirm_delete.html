{% extends 'base.html' %}
{% block page_title %}Delete Course{% endblock %}
{% block content %}
<div class="d-flex justify-content-center mt-5">
  <div class="card p-5 text-center" style="max-width:460px">
    <div style="font-size:48px">⚠️</div>
    <h5 class="fw-bold mt-2">Delete "{{ object.title }}"?</h5>
    <p class="text-muted">This will permanently delete the course, all notes, assignments, and quizzes. This cannot be undone.</p>
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
      <a href="{% url 'courses:detail' object.slug %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
