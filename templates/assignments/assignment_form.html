{% extends 'base.html' %}
{% block page_title %}Create Assignment{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <h5 class="fw-bold mb-1">📝 Create Assignment</h5>
      <p class="text-muted small mb-4">Course: <strong>{{ course.title }}</strong></p>
      <form method="post" enctype="multipart/form-data">{% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold small">{{ field.label }}</label>{{ field }}
          {% if field.errors %}<div class="text-danger" style="font-size:12px">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn text-white" style="background:#4f46e5">Create Assignment</button>
        <a href="{% url 'courses:detail' course.slug %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
